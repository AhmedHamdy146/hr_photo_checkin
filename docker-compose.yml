services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    # Doubles as the redis_socketio backend too — see docker-entrypoint.sh.
    # Frappe no longer needs a 3rd dedicated Redis process for this.

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  erp:
    build: .
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    environment:
      SITE_NAME: ${SITE_NAME:-localhost}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-admin123}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - bench-data:/home/frappe/frappe-bench

volumes:
  mariadb-data:
  redis-queue-data:
  bench-data: